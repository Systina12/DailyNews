<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.8;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 {
            color: #1a1a1a;
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 30px 0;
            padding-bottom: 20px;
            border-bottom: 3px solid #2196F3;
        }
        h2 {
            color: #2196F3;
            font-size: 20px;
            font-weight: 600;
            margin: 35px 0 20px 0;
        }
        h2:first-of-type {
            margin-top: 0;
        }
        p {
            margin: 0 0 20px 0;
            text-align: justify;
            font-size: 16px;
            line-height: 1.8;
        }
        a {
            color: #2196F3;
            text-decoration: none;
            transition: color 0.2s;
        }
        a:hover {
            color: #1976D2;
            text-decoration: underline;
        }
        sup {
            margin: 0 2px;
        }
        sup a {
            font-size: 12px;
            padding: 1px 4px;
            background-color: #e3f2fd;
            border-radius: 3px;
            font-weight: 500;
        }
        sup a:hover {
            background-color: #bbdefb;
            text-decoration: none;
        }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 13px;
            text-align: center;
        }
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 24px;
            }
            h2 {
                font-size: 18px;
            }
            p {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2026-03-06 头条</h1>
        <h2>【ds新闻】</h2>
        <p>中国经济持续增长，GDP增速达到5.2%[1]。</p>
        <p>科技创新推动产业升级，新能源汽车销量创新高[2]。</p>
        <h2>【gemini新闻】</h2>
        <p>国际局势紧张，多国加强军事部署[3]。</p>
        <div class="footer">
            <p>DailyNews 新闻摘要系统</p>
            <p>生成时间: 2026-03-06 22:20:50</p>
        </div>
    </div>
</body>
</html>
