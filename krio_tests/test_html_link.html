<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .news-item { border: 1px solid #ddd; padding: 15px; margin: 10px; }
        .link { color: #1976d2; text-decoration: none; }
        .link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>HTML链接测试</h1>
    
    <div class="news-item">
        <div><strong>95分</strong> [头条]</div>
        <div><strong>标题：</strong>测试新闻标题</div>
        <div><strong>摘要：</strong>这是一条测试新闻的摘要内容。</div>
        <div><strong>链接：</strong><a class="link" href="https://www.example.com/news/test" target="_blank">查看原文 →</a></div>
    </div>
    
    <hr>
    
    <h2>调试信息</h2>
    <pre>
原始链接: https://www.example.com/news/test
处理后链接: https://www.example.com/news/test
HTML代码: &lt;a href="https://www.example.com/news/test" target="_blank"&gt;查看原文 →&lt;/a&gt;
    </pre>
    
    <h2>测试链接</h2>
    <p>直接链接测试：<a href="https://www.example.com" target="_blank">点击这里</a></p>
    <p>变量链接测试：<a href="https://www.example.com/news/test" target="_blank">点击这里</a></p>
</body>
</html>
